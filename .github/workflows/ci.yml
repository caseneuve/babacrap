name: CI

on:
  push:
    branches: [master, main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test, lint, and CRAP analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          bb: latest
          clj-kondo: latest
          clojure-lsp: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('bb.edn', 'deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Run tests
        run: bb test

      - name: Run lint
        run: bb lint

      - name: Run dogfood CRAP analysis
        run: >-
          bb crap
          --src src
          --test test
          --ns-regex 'babacrap.*'
          --test-ns-regex 'babacrap.*-test'
          --output target/dogfood-crap
          --crap-threshold 30
